<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>뱀 게임</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: #081b2a;
      color: #e6f2ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .game-shell { width: min(100%, 520px); text-align: center; }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3rem); letter-spacing: -0.05em; }
    .panel { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.15); border-radius: 18px; padding: 18px; }
    .score-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .score { min-width: 140px; background: rgba(255,255,255,.08); border-radius: 14px; padding: 12px 14px; }
    .score strong { display: block; font-size: 1.15rem; margin-bottom: 4px; }
    #gameCanvas { width: 100%; height: auto; border-radius: 18px; background: #0f2d4b; display: block; margin: 0 auto 16px; }
    .controls { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); max-width: 260px; margin: 0 auto 12px; }
    .controls button { border: none; border-radius: 12px; padding: 12px 0; background: rgba(255,255,255,.12); color: #e6f2ff; font-size: 1rem; cursor: pointer; transition: transform .15s ease, background .15s ease; }
    .controls button:active { transform: translateY(1px); background: rgba(255,255,255,.2); }
    .controls button:nth-child(2) { grid-column: 2; }
    .controls button:nth-child(4) { grid-column: 1 / span 3; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
    .toolbar button { border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: #e6f2ff; border-radius: 12px; padding: 12px 18px; cursor: pointer; transition: background .15s ease; }
    .toolbar button:hover { background: rgba(255,255,255,.16); }
    .message { margin-top: 12px; color: #a6c7ff; font-size: 0.95rem; line-height: 1.5; }
    footer { margin-top: 16px; color: rgba(230,242,255,.65); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="game-shell panel">
    <h1>뱀 게임</h1>
    <div class="score-row">
      <div class="score"><strong>점수</strong><span id="scoreValue">0</span></div>
      <div class="score"><strong>최고 점수</strong><span id="bestValue">0</span></div>
    </div>
    <canvas id="gameCanvas" width="420" height="420"></canvas>
    <div class="toolbar">
      <button id="startBtn">새 게임</button>
      <button id="pauseBtn">일시정지</button>
      <button id="resetBtn">초기화</button>
    </div>
    <div class="controls" aria-label="방향키 컨트롤">
      <button id="upBtn" aria-label="위로 이동">▲</button>
      <button disabled></button>
      <button id="rightBtn" aria-label="오른쪽 이동">▶</button>
      <button id="leftBtn" aria-label="왼쪽 이동">◀</button>
      <button disabled></button>
      <button id="downBtn" aria-label="아래로 이동">▼</button>
    </div>
    <div class="message">
      <p>화살표 키 또는 WASD로 이동하세요.</p>
      <p>먹이를 먹을 때마다 길이가 늘어납니다. 벽이나 자신의 몸에 닿으면 게임 오버!</p>
    </div>
    <footer>간단한 브라우저 기반 뱀 게임</footer>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreValue = document.getElementById('scoreValue');
    const bestValue = document.getElementById('bestValue');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const upBtn = document.getElementById('upBtn');
    const downBtn = document.getElementById('downBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');

    const GRID_SIZE = 21;
    const CELL_SIZE = canvas.width / GRID_SIZE;
    const STORAGE_KEY = 'snake-best-score';

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = null;
    let score = 0;
    let intervalId = null;
    let isRunning = false;
    let isPaused = false;
    let bestScore = Number(localStorage.getItem(STORAGE_KEY) || '0');

    bestValue.textContent = bestScore;

    function resetGame() {
      snake = [ { x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 } ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      food = getRandomFoodPosition();
      scoreValue.textContent = score;
      drawBoard();
    }

    function getRandomFoodPosition() {
      const available = [];
      for (let y = 1; y < GRID_SIZE - 1; y++) {
        for (let x = 1; x < GRID_SIZE - 1; x++) {
          if (!snake.some(part => part.x === x && part.y === y)) {
            available.push({ x, y });
          }
        }
      }
      return available[Math.floor(Math.random() * available.length)];
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#102d54';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#1b4b82';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const pos = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
      drawFood();
      drawSnake();
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#ffd966' : '#f6b73c';
        ctx.fillRect(segment.x * CELL_SIZE + 1, segment.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      });
    }

    function drawFood() {
      if (!food) return;
      const gradient = ctx.createRadialGradient(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        3,
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE / 2
      );
      gradient.addColorStop(0, '#ff5f58');
      gradient.addColorStop(1, '#d11c1c');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(food.x * CELL_SIZE + CELL_SIZE / 2, food.y * CELL_SIZE + CELL_SIZE / 2, CELL_SIZE * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    function step() {
      if (!isRunning || isPaused) return;
      direction = nextDirection;
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE || snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);
      if (food && head.x === food.x && head.y === food.y) {
        score += 1;
        scoreValue.textContent = score;
        food = getRandomFoodPosition();
      } else {
        snake.pop();
      }

      drawBoard();
    }

    function startGame() {
      if (intervalId) clearInterval(intervalId);
      resetGame();
      isRunning = true;
      isPaused = false;
      pauseBtn.textContent = '일시정지';
      intervalId = setInterval(step, 120);
    }

    function pauseGame() {
      if (!isRunning) return;
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '다시 시작' : '일시정지';
      drawBoard();
    }

    function endGame() {
      isRunning = false;
      clearInterval(intervalId);
      intervalId = null;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem(STORAGE_KEY, String(bestScore));
        bestValue.textContent = bestScore;
      }
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('게임 오버', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '16px sans-serif';
      ctx.fillText('새 게임을 눌러 다시 시작하세요', canvas.width / 2, canvas.height / 2 + 24);
    }

    function handleDirectionChange(newDir) {
      if (newDir.x === -direction.x && newDir.y === -direction.y) return;
      nextDirection = newDir;
    }

    window.addEventListener('keydown', event => {
      const key = event.key;
      if (key === 'ArrowUp' || key === 'w' || key === 'W') handleDirectionChange({ x: 0, y: -1 });
      if (key === 'ArrowDown' || key === 's' || key === 'S') handleDirectionChange({ x: 0, y: 1 });
      if (key === 'ArrowLeft' || key === 'a' || key === 'A') handleDirectionChange({ x: -1, y: 0 });
      if (key === 'ArrowRight' || key === 'd' || key === 'D') handleDirectionChange({ x: 1, y: 0 });
      if (key === ' ' && isRunning) pauseGame();
    });

    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', pauseGame);
    resetBtn.addEventListener('click', () => {
      clearInterval(intervalId);
      isRunning = false;
      isPaused = false;
      pauseBtn.textContent = '일시정지';
      resetGame();
    });
    upBtn.addEventListener('click', () => handleDirectionChange({ x: 0, y: -1 }));
    downBtn.addEventListener('click', () => handleDirectionChange({ x: 0, y: 1 }));
    leftBtn.addEventListener('click', () => handleDirectionChange({ x: -1, y: 0 }));
    rightBtn.addEventListener('click', () => handleDirectionChange({ x: 1, y: 0 }));

    resetGame();
  </script>
</body>
</html>
